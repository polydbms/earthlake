model:
  # Recommend using ChatGPT or DeepSeek APIs for complex IE task.
  category: ChatGPT # model category, chosen from ChatGPT, DeepSeek, LLaMA, Qwen, ChatGLM, MiniCPM, OneKE.
  model_name_or_path: gpt-4.1 # # model name, chosen from the model list of the selected category.
  #api_key: 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 # your API key for the model with API service. No need for open-source models.
  api_key: "" # set in .env
  base_url: https://api.openai.com/v1/ # # base URL for the API service. No need for open-source models.

extraction:
  task: Base # task type, chosen from Base, NER, RE, EE.
  instruction: You are an expert information extractor for remote sensing foundation models. Your task is to extract all relevant information from the given text (PDF, HTML, or plain text) # description for the task. No need for NER, RE, EE task.
  use_file: true # whether to use a file for the input text. Default set to false.
  file_path: ./data/input_models/aiearth.pdf # path to the input file. No need if use_file is set to false.
  output_schema: FoundationModels # output schema for the extraction task. Selected the from schema repository.
  mode: customized # extraction mode, chosen from quick, detailed, customized. Default set to quick. See src/config.yaml for more details.
  update_case: false # whether to update the case repository. Default set to false.
  show_trajectory: false # whether to display the extracted intermediate steps
  target_dir: /model_metadata_predictions
