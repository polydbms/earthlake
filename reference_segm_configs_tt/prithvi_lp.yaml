# lightning.pytorch==2.1.1
seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed

  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
    init_args:
      save_dir: ./prithvi_100M_linear_probe
      name: logs

  callbacks:
    - class_path: RichProgressBar
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: epoch

  max_epochs: 10
  check_val_every_n_epoch: 1
  log_every_n_steps: 50
  enable_checkpointing: true
  default_root_dir: ./prithvi_100M_linear_probe

data:
  class_path: terratorch.datamodules.GenericNonGeoSegmentationDataModule
  init_args:
    batch_size: 16
    num_workers: 8
    dataset_bands:
      - COASTAL_AEROSOL
      - BLUE
      - GREEN
      - RED
      - RED_EDGE_1
      - RED_EDGE_2
      - RED_EDGE_3
      - NIR_BROAD
      - NIR_NARROW
      - WATER_VAPOR
      - CIRRUS
      - SWIR_1
      - SWIR_2
    output_bands:
      - BLUE
      - GREEN
      - RED
      - NIR_NARROW
      - SWIR_1
      - SWIR_2
    rgb_indices:
      - 2
      - 1
      - 0
    train_data_root: sen1floods11_v1.1/data/S2L1CHand
    train_label_data_root: sen1floods11_v1.1/data/LabelHand
    val_data_root: sen1floods11_v1.1/data/S2L1CHand
    val_label_data_root: sen1floods11_v1.1/data/LabelHand
    test_data_root: sen1floods11_v1.1/data/S2L1CHand
    test_label_data_root: sen1floods11_v1.1/data/LabelHand
    train_split: sen1floods11_v1.1/splits/flood_train_data.txt
    test_split: sen1floods11_v1.1/splits/flood_test_data.txt
    val_split: sen1floods11_v1.1/splits/flood_valid_data.txt

    img_grep: "*_S2Hand.tif"
    label_grep: "*_LabelHand.tif"
    no_label_replace: -1
    no_data_replace: 0
    means:
      - 1087.0
      - 1342.0
      - 1433.0
      - 2734.0
      - 1958.0
      - 1363.0
    stds:
      - 2248.0
      - 2179.0
      - 2178.0
      - 1850.0
      - 1242.0
      - 1049.0
    train_transform:
      - class_path: albumentations.D4
      - class_path: albumentations.pytorch.transforms.ToTensorV2
    num_classes: 2

model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: EncoderDecoderFactory
    model_args:
      # --- 100M BACKBONE ---
      backbone: prithvi_eo_v1_100
      backbone_pretrained: true
      backbone_bands:
        - BLUE
        - GREEN
        - RED
        - NIR_NARROW
        - SWIR_1
        - SWIR_2
      necks:
        - name: SelectIndices
          indices: [2, 5, 8, 11] # 100M layers
        - name: ReshapeTokensToImage
        - name: LearnedInterpolateToPyramidal

      decoder: FCNDecoder
      decoder_channels: 256
      num_classes: 2

    loss: dice
    ignore_index: -1

    freeze_backbone: true
    freeze_decoder: false

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 1.e-4
    weight_decay: 0.1
lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/loss
    patience: 5
    factor: 0.5